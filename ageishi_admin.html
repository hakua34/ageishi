<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理画面</title>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    padding:20px; /* スマホ用に余白を少し縮小 */
    margin:0;
}

.container{
    width:100%;
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:20px; /* スマホ用に内側余白を調整 */
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    box-sizing:border-box;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:24px; /* スマホで見やすいサイズ */
}

label{
    font-size:18px;
    font-weight:bold;
    display:block;
}

input{
    width:100%;
    font-size:22px; /* スマホのキーボードが出ても扱いやすいサイズ */
    padding:12px;
    margin-top:8px;
    margin-bottom:24px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    font-size:22px;
    border:none;
    border-radius:15px;
    background:black;
    color:white;
    cursor:pointer;
    box-sizing:border-box;
}

button:hover{
    opacity:0.9;
}

.status-toggle-btn {
    width: 100%;
    padding: 12px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    margin-top: 8px;
    margin-bottom: 24px;
    transition: background 0.3s;
    box-sizing:border-box;
}

.status{
    text-align:center;
    margin-top:20px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h1>待ち時間 管理画面</h1>

<label>通常列人数</label>
<input type="number" id="normalPeople" value="0">

<label>運行ステータス</label>
<button type="button" id="statusButton" class="status-toggle-btn" style="background:#00cc66;">運行中</button>

<label>シングルライダー人数</label>
<input type="number" id="singlePeople" value="0">

<label>現在案内中の整理券</label>
<input type="text" id="ticketTime" value="14:00">

<button id="updateButton">更新</button>

<div class="status" id="status"></div>

</div>

<script type="module">

import { db, ref, set, onValue } from "./firebase.js";

const updateButton = document.getElementById("updateButton");
const statusButton = document.getElementById("statusButton");

let isSuspended = false;

onValue(ref(db, "waitData"), (snapshot) => {
    const data = snapshot.val();
    if (!data) return;

    if (document.activeElement !== document.getElementById("normalPeople")) {
        document.getElementById("normalPeople").value = data.normalPeople ?? 0;
    }
    if (document.activeElement !== document.getElementById("singlePeople")) {
        document.getElementById("singlePeople").value = data.singlePeople ?? 0;
    }
    if (document.activeElement !== document.getElementById("ticketTime")) {
        document.getElementById("ticketTime").value = data.ticketTime ?? "14:00";
    }

    isSuspended = data.isSuspended || false;
    if (isSuspended) {
        statusButton.innerText = "一時休止中";
        statusButton.style.background = "#ff3333";
    } else {
        statusButton.innerText = "運行中";
        statusButton.style.background = "#00cc66";
    }
});

statusButton.addEventListener("click", () => {
    isSuspended = !isSuspended;
    if (isSuspended) {
        statusButton.innerText = "一時休止中";
        statusButton.style.background = "#ff3333";
    } else {
        statusButton.innerText = "運行中";
        statusButton.style.background = "#00cc66";
    }
});

updateButton.addEventListener("click", async () => {
    const normalPeople = Number(document.getElementById("normalPeople").value);
    const singlePeople = Number(document.getElementById("singlePeople").value);
    const ticketTime = document.getElementById("ticketTime").value;

    await set(ref(db, "waitData"), {
        normalPeople,
        singlePeople,
        ticketTime,
        isSuspended,
        updatedAt: new Date().toLocaleTimeString("ja-JP")
    });

    document.getElementById("status").innerText = "更新しました";
    
    setTimeout(() => {
        document.getElementById("status").innerText = "";
    }, 3000);
});

</script>

</body>
</html>
