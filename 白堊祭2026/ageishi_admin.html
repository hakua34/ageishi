
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>管理画面</title>

<style>
body{
    font-family:sans-serif;
    background:#f5f5f5;
    padding:40px;
}

.container{
    max-width:500px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:40px;
}

label{
    font-size:20px;
    font-weight:bold;
}

input{
    width:100%;
    font-size:28px;
    padding:15px;
    margin-top:10px;
    margin-bottom:30px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:20px;
    font-size:28px;
    border:none;
    border-radius:15px;
    background:black;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.status{
    text-align:center;
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h1>待ち時間 管理画面</h1>

<label>通常列人数</label>
<input type="number" id="normalPeople" value="0">

<label>シングルライダー人数</label>
<input type="number" id="singlePeople" value="0">

<label>現在案内中の整理券</label>
<input type="text" id="ticketTime" value="14:00">

<button id="updateButton">更新</button>

<div class="status" id="status"></div>

</div>

<script type="module">

import { db, ref, set } from "./firebase.js";

const button = document.getElementById("updateButton");

button.addEventListener("click", async () => {

    const normalPeople =
        Number(document.getElementById("normalPeople").value);

    const singlePeople =
        Number(document.getElementById("singlePeople").value);

    const ticketTime =
        document.getElementById("ticketTime").value;

    await set(ref(db, "waitData"), {
        normalPeople,
        singlePeople,
        ticketTime,
        updatedAt: new Date().toLocaleTimeString("ja-JP")
    });

    document.getElementById("status").innerText =
        "更新しました";
});

</script>

</body>
</html>
