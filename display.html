<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>待ち時間表示</title>

<style>
body{
    margin:0;
    background:white;
    color:black;
    font-family:sans-serif;
    overflow: hidden; /* 1画面に収めるため画面全体のスクロールを禁止 */
}

.container{
    width:100vw;
    /* Safariのツールバー対策としてdvh（Dynamic vh）を採用 */
    height: 100vh;
    height: 100dvh; 
    display:flex;
    flex-direction:column;
    justify-content: space-between;
    box-sizing: border-box;
}

.title{
    text-align:center;
    font-size: 5vw; 
    font-weight:bold;
    padding: 20px 10px;
}

.main{
    flex:1;
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:10px;
}

.block{
    width:42%;
    text-align:center;
}

.label{
    font-size: 3vw;
    margin-bottom:15px;
}

.timeBox{
    background:black;
    border-radius:25px;
    padding:30px 10px;
    color:#00cc66;
    font-size: 7vw;
    font-weight:bold;
}

.ticketArea{
    text-align:center;
    padding:20px 10px;
    background:#f0f0f0;
}

.ticketTitle{
    font-size: 2.5vw;
    margin-bottom:10px;
}

.ticketTime{
    font-size: 6vw;
    font-weight:bold;
}

.updateTime{
    position:fixed;
    bottom:10px;
    right:20px;
    color:#666;
    font-size:14px;
}

/* 白基調に変更した一時休止用の画面オーバーレイ */
.overlay {
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh;
    height: 100dvh; /* ここもSafari対策 */
    background: rgba(255, 255, 255, 0.95); /* ご指定の白基調 */
    color: black; /* 文字を黒に */
    z-index: 9999; 
    justify-content: center; 
    align-items: center; 
    flex-direction: column;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
}

/* ========================================================
   タブレット縦向き・スマホ用のレスポンシブ設定 (画面幅768px以下)
   ======================================================== */
@media (max-width: 768px) {
    .title {
        font-size: 24px;
        padding: 10px 5px;
    }
    
    /* 大幅に幅を取っていた .main の要素を限界まで詰める */
    .main {
        flex-direction: column; 
        justify-content: center;
        align-items: center;
        flex: 1;
        padding: 0px 10px;
        gap: 10px; /* 要素間の隙間を狭く */
    }
    
    .block {
        width: 90%; 
    }
    
    .label {
        font-size: 18px;
        margin-bottom: 4px;
    }
    
    .timeBox {
        font-size: 36px; /* 文字を少し小さく */
        padding: 8px 0;  /* 上下クッションを縮小 */
        border-radius: 12px;
    }
    
    .ticketArea {
        padding: 10px 5px; /* 上下を縮小 */
        margin-bottom: 20px; /* Last Updateの文字と被らないための余白 */
    }
    
    .ticketTitle {
        font-size: 16px;
        margin-bottom: 2px;
    }
    
    .ticketTime {
        font-size: 32px;
    }
    
    .updateTime {
        font-size: 11px;
        bottom: 5px;
        right: 10px;
        background: rgba(255, 255, 255, 0.9); 
        padding: 1px 4px;
    }

    /* 一時休止画面（スマホ版・白基調用） */
    .overlay .overlay-title {
        font-size: 36px !important;
        margin-bottom: 15px !important;
    }
    .overlay .overlay-text1 {
        font-size: 18px !important;
        color: #333 !important;
        margin-bottom: 10px !important;
    }
    .overlay .overlay-text2 {
        font-size: 16px !important;
        color: #666 !important;
    }
}
</style>
</head>

<body>

<div id="suspensionOverlay" class="overlay">
    <div class="overlay-title" style="font-size: 80px; font-weight: bold; color: #ff3333; margin-bottom: 20px;">⚠️ 一時休止中</div>
    <div class="overlay-text1" style="font-size: 36px; color: #333; margin-bottom: 15px;">ただいま安全点検（または調整）を行っております。</div>
    <div class="overlay-text2" style="font-size: 30px; color: #666;">運転再開までしばらくお待ちください。</div>
</div>

<div class="container">

<div class="title">
揚石体内探検隊　待ち時間
</div>

<div class="main">

<div class="block">
    <div class="label">
        通常（2人1組）
    </div>

    <div class="timeBox" id="normalWait">
        約0分
    </div>
</div>

<div class="block">
    <div class="label">
        シングルライダー
    </div>

    <div class="timeBox" id="singleWait">
        約0分
    </div>
</div>

</div>

<div class="ticketArea">

<div class="ticketTitle">
現在案内中の整理券
</div>

<div class="ticketTime" id="ticketTime">
14:00
</div>

</div>

<div class="updateTime" id="updateTime">
Last Update --
</div>

</div>

<script type="module">

import { db, ref, onValue } from "./firebase.js";

const normalWait = document.getElementById("normalWait");
const singleWait = document.getElementById("singleWait");
const ticketTime = document.getElementById("ticketTime");
const updateTime = document.getElementById("updateTime");
const overlay = document.getElementById("suspensionOverlay");

function calcNormal(people){
    return Math.max(5, Math.ceil(people / 8) * 5);
}

function calcSingle(people){
    return Math.max(5, Math.ceil(people / 4) * 5);
}

function getColor(minutes){
    if(minutes <= 20){ return "#00cc66"; }
    if(minutes <= 40){ return "#ffcc00"; }
    return "#ff8800";
}

onValue(ref(db, "waitData"), (snapshot) => {
    const data = snapshot.val();
    if(!data) return;

    if (data.isSuspended) {
        overlay.style.display = "flex";
    } else {
        overlay.style.display = "none";
    }

    const normalMinutes = calcNormal(data.normalPeople);
    const singleMinutes = calcSingle(data.singlePeople);

    normalWait.innerText = `約${normalMinutes}分`;
    singleWait.innerText = `約${singleMinutes}分`;

    normalWait.style.color = getColor(normalMinutes);
    singleWait.style.color = getColor(singleMinutes);

    ticketTime.innerText = data.ticketTime;
    updateTime.innerText = `Last Update ${data.updatedAt}`;
});

</script>

</body>
</html>
