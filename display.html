<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>待ち時間表示</title>

<style>

body{
    margin:0;
    background:white;
    color:black;
    font-family:sans-serif;
}

.container{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.title{
    text-align:center;
    font-size:60px;
    font-weight:bold;
    padding:30px 0;
}

.main{
    flex:1;
    display:flex;
    justify-content:space-around;
    align-items:center;
}

.block{
    width:40%;
    text-align:center;
}

.label{
    font-size:40px;
    margin-bottom:30px;
}

.timeBox{
    background:black;
    border-radius:25px;
    padding:40px;
    color:#00cc66;
    font-size:100px;
    font-weight:bold;
}

.ticketArea{
    text-align:center;
    padding:40px;
    background:#f0f0f0;
}

.ticketTitle{
    font-size:36px;
    margin-bottom:20px;
}

.ticketTime{
    font-size:80px;
    font-weight:bold;
}

.updateTime{
    position:fixed;
    bottom:10px;
    right:20px;
    color:#666;
    font-size:18px;
}

/* 一時休止用の画面オーバーレイ */
.overlay {
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100vw; 
    height: 100vh; 
    background: rgba(250, 250, 250, 0.95); 
    color: white; 
    z-index: 9999; 
    justify-content: center; 
    align-items: center; 
    flex-direction: column;
}

</style>
</head>

<body>

<div id="suspensionOverlay" class="overlay">
    <div style="font-size: 90px; font-weight: bold; color: #ff3333; margin-bottom: 30px;">⚠️ 一時休止中</div>
    <div style="font-size: 40px; color: #262525; margin-bottom: 15px;">ただいま安全点検（または調整）を行っております。</div>
    <div style="font-size: 36px; color: #615f5f;">運転再開までしばらくお待ちください。</div>
</div>

<div class="container">

<div class="title">
揚石体内探検隊　待ち時間
</div>

<div class="main">

<div class="block">
    <div class="label">
        通常（2人1組）
    </div>

    <div class="timeBox" id="normalWait">
        約0分
    </div>
</div>

<div class="block">
    <div class="label">
        シングルライダー
    </div>

    <div class="timeBox" id="singleWait">
        約0分
    </div>
</div>

</div>

<div class="ticketArea">

<div class="ticketTitle">
現在案内中の整理券
</div>

<div class="ticketTime" id="ticketTime">
14:00
</div>

</div>

<div class="updateTime" id="updateTime">
Last Update --
</div>

</div>

<script type="module">

import { db, ref, onValue } from "./firebase.js";

const normalWait =
    document.getElementById("normalWait");

const singleWait =
    document.getElementById("singleWait");

const ticketTime =
    document.getElementById("ticketTime");

const updateTime =
    document.getElementById("updateTime");

const overlay = 
    document.getElementById("suspensionOverlay");

function calcNormal(people){

    return Math.max(
        5,
        Math.ceil(people / 8) * 5
    );
}

function calcSingle(people){

    return Math.max(
        5,
        Math.ceil(people / 4) * 5
    );
}

function getColor(minutes){

    if(minutes <= 20){
        return "#00cc66";
    }

    if(minutes <= 40){
        return "#ffcc00";
    }

    return "#ff8800";
}

onValue(ref(db, "waitData"), (snapshot) => {

    const data = snapshot.val();

    if(!data) return;

    // 一時休止フラグのチェック
    if (data.isSuspended) {
        overlay.style.display = "flex";
    } else {
        overlay.style.display = "none";
    }

    const normalMinutes =
        calcNormal(data.normalPeople);

    const singleMinutes =
        calcSingle(data.singlePeople);

    normalWait.innerText =
        `約${normalMinutes}分`;

    singleWait.innerText =
        `約${singleMinutes}分`;

    normalWait.style.color =
        getColor(normalMinutes);

    singleWait.style.color =
        getColor(singleMinutes);

    ticketTime.innerText =
        data.ticketTime;

    updateTime.innerText =
        `Last Update ${data.updatedAt}`;
});

</script>

</body>
</html>
